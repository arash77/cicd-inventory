name: CI

on:
  pull_request:
  push:
    branches: [main]

# Defense-in-depth: deny all permissions at workflow level.
# Each job declares only what it actually needs.
permissions: {}

# Cancel in-progress runs on the same ref to save CI time on force-pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Lint and test the Python extractor
  # -----------------------------------------------------------------------
  lint-and-test-python:
    name: Lint and test Python extractor
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "extractor/pyproject.toml"

      - name: Install dependencies
        working-directory: extractor
        run: uv sync --frozen

      - name: Lint (ruff check)
        working-directory: extractor
        run: uv run ruff check src/ tests/

      - name: Format check (ruff format)
        working-directory: extractor
        run: uv run ruff format --check src/ tests/

      - name: Run tests
        working-directory: extractor
        run: uv run pytest -v

  # -----------------------------------------------------------------------
  # Job 2: Build the Astro site and run Playwright tests
  # -----------------------------------------------------------------------
  build-and-test-site:
    name: Build and test Astro site
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: site
        run: pnpm install --frozen-lockfile

      - name: Build site
        working-directory: site
        run: pnpm run build

      - name: Get Playwright version
        id: playwright-version
        working-directory: site
        run: echo "version=$(pnpm exec playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: site
        # Both projects (desktop-chrome, mobile-chrome) use Chromium — no need for Firefox/WebKit.
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: site
        run: pnpm exec playwright install-deps chromium

      - name: Run Playwright tests
        working-directory: site
        run: pnpm run test
        env:
          SKIP_BUILD: "true"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: site/playwright-report/
          retention-days: 7
