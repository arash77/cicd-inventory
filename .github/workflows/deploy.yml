name: Build and Deploy CI/CD Inventory

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'   # Daily at 06:00 UTC
  workflow_dispatch:        # Allow manual trigger

# Defense-in-depth: deny all permissions at workflow level.
# Each job declares only what it actually needs.
permissions: {}

# Concurrency is managed per-job:
# - extract/build cancel in-progress runs on new pushes (saves CI time).
# - deploy uses the "pages" group without cancellation — a partial deployment
#   would leave the site broken and Pages serializes deploys via this group.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Run the Python extractor to fetch workflow data from GitHub
  # -----------------------------------------------------------------------
  extract:
    name: Extract workflow data
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: extract-${{ github.ref }}
      cancel-in-progress: true

    permissions:
      contents: read   # checkout only

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "extractor/pyproject.toml"

      - name: Install extractor dependencies
        working-directory: extractor
        run: uv sync --frozen

      - name: Run extractor
        working-directory: extractor
        env:
          # Use a dedicated PAT — GITHUB_TOKEN cannot read cross-org data.
          # Required scopes: read:org, public_repo
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          # Pass org list via env to avoid script-injection via run: interpolation.
          ORGS: "BioContainers,galaxyproject,usegalaxy-eu"
        run: |
          uv run cicd-inventory \
            --orgs "$ORGS" \
            --output-dir "../site/src/content/workflows"

      - name: Upload workflow data artifact
        uses: actions/upload-artifact@v7
        with:
          name: workflow-data
          path: site/src/content/workflows/
          retention-days: 1

  # -----------------------------------------------------------------------
  # Job 2: Build the Astro site and upload the Pages artifact
  # -----------------------------------------------------------------------
  build:
    name: Build Astro site
    runs-on: ubuntu-latest
    needs: extract
    timeout-minutes: 20
    concurrency:
      group: build-${{ github.ref }}
      cancel-in-progress: true

    permissions:
      contents: read
      pages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Download workflow data
        uses: actions/download-artifact@v8
        with:
          name: workflow-data
          path: site/src/content/workflows/

      - name: Build and upload Astro site
        uses: withastro/action@v6
        with:
          path: site
          package-manager: pnpm@latest
        env:
          ASTRO_SITE: ${{ steps.pages.outputs.origin }}
          ASTRO_BASE: ${{ steps.pages.outputs.base_path }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}

  # -----------------------------------------------------------------------
  # Job 3: Deploy the Pages artifact
  # -----------------------------------------------------------------------
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    concurrency:
      group: pages
      cancel-in-progress: false

    permissions:
      pages: write       # deploy to Pages
      id-token: write    # OIDC token required by deploy-pages

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
